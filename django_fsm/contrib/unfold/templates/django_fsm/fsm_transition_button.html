<button
    type="submit"
    form="{{ opts.model_name }}_form"
    name="_fsm_transition_to"
    value="{{ transition.name }}"
    title="{% firstof transition.custom.short_description transition.custom.label transition.name %}"
    class="font-medium inline-flex group items-center gap-2 px-3 py-2 relative rounded-default justify-center whitespace-nowrap cursor-pointer border border-base-200 bg-white shadow-xs text-important dark:border-base-700 dark:bg-transparent hover:bg-base-100/80 dark:hover:bg-base-800/80
w-full lg:w-auto {{ transition.custom.css_classes }}"
>
    {% firstof transition.custom.label transition.name %}
</button>
